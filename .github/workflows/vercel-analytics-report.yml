name: Vercel Analytics Report

permissions:
  actions: read
  contents: read

on:
  schedule:
    # Every Monday at 9am UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      period:
        description: "Analytics period (e.g., 7d, 14d, 30d)"
        required: false
        default: "7d"

jobs:
  kill-switch-preflight:
    uses: ./.github/workflows/kill-switch-preflight.yml

  slack-notify-start:
    needs: kill-switch-preflight
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: start
      workflow_name: Vercel Analytics Report
      job_name: analyze
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}

  analyze:
    needs:
      - kill-switch-preflight
      - slack-notify-start
    if: ${{ needs.kill-switch-preflight.outputs.active != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20.19.0"

      - name: Run Vercel Analytics Agent
        env:
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANALYTICS_PERIOD: ${{ inputs.period || '7d' }}
        run: node scripts/vercel-analytics-agent.mjs

  slack-notify-finish:
    needs:
      - slack-notify-start
      - analyze
    if: ${{ always() && needs.slack-notify-start.result == 'success' && needs.analyze.result != 'skipped' }}
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: finish
      workflow_name: Vercel Analytics Report
      job_name: analyze
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      status: ${{ needs.analyze.result }}
      slack_channel_id: ${{ needs.slack-notify-start.outputs.slack_channel_id }}
      slack_message_ts: ${{ needs.slack-notify-start.outputs.slack_message_ts }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}

  slack-notify-kill-switch-skip:
    needs:
      - kill-switch-preflight
      - slack-notify-start
      - analyze
    if: ${{ always() && needs.slack-notify-start.result == 'success' && needs.kill-switch-preflight.outputs.active == 'true' && needs.analyze.result == 'skipped' }}
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: finish
      workflow_name: Vercel Analytics Report
      job_name: analyze
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      status: success
      status_message: ${{ format('Intentionally skipped because the ItemTraxx kill switch is active. {0}', needs.kill-switch-preflight.outputs.message) }}
      slack_channel_id: ${{ needs.slack-notify-start.outputs.slack_channel_id }}
      slack_message_ts: ${{ needs.slack-notify-start.outputs.slack_message_ts }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}

  incidentio-notify-failure:
    needs:
      - kill-switch-preflight
      - analyze
    if: ${{ always() && needs.kill-switch-preflight.outputs.active != 'true' && (needs.analyze.result == 'failure' || needs.analyze.result == 'cancelled') }}
    uses: ./.github/workflows/incidentio-workflow-alert.yml
    with:
      status: ${{ needs.analyze.result }}
      severity: high
      workflow_name: Vercel Analytics Report
      job_name: analyze
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      repository: ${{ github.repository }}
      branch: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      environment: production
    secrets:
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}
