name = "itemtraxx-edge-proxy"
main = "src/index.ts"
compatibility_date = "2026-02-11"
workers_dev = false
preview_urls = false

[vars]
# Comma-separated origins allowed to call this proxy.
ALLOWED_ORIGINS = "https://itemtraxx.com,https://www.itemtraxx.com,https://*.itemtraxx.com,https://internal.itemtraxx.com,https://app.itemtraxx.com,https://*.app.itemtraxx.com"
TRUST_LOCAL_ORIGINS = "false"
# Optional hard allowlist of function names (comma-separated).
ALLOWED_FUNCTIONS = "tenant-login,checkoutReturn,create-tenant-admin,admin-gear-mutate,admin-student-mutate,admin-ops,system-status,super-tenant-mutate,super-admin-mutate,super-dashboard,super-gear-mutate,super-student-mutate,super-logs-query,super-ops,district-dashboard,district-admin-mutate,contact-sales-submit,contact-support-submit,job-worker,login-notify,super-auth-verify,district-handoff,tenant-admin-mutate,privileged-step-up"
ITX_ITEMTRAXX_KILLSWITCH_ENABLED = "false"
SENTRY_ENVIRONMENT = "production"

[[routes]]
pattern = "edge.itemtraxx.com"
zone_name = "itemtraxx.com"
custom_domain = true
