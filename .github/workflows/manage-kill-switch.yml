name: Manage Kill Switch

permissions:
  actions: read
  contents: read

on:
  workflow_dispatch:
    inputs:
      enabled:
        description: "Enable or disable the kill switch."
        required: true
        type: choice
        default: disable
        options:
          - enable
          - disable
      message:
        description: "Kill-switch message shown in the app overlay and edge 503 responses."
        required: false
        default: "Unfortunately ItemTraxx is currently unavailable. We apologize for any inconvenience and are working to restore access as soon as possible. Please see the status page (https://status.itemtraxx.com/) for more information."

concurrency:
  group: manage-kill-switch
  cancel-in-progress: false

jobs:
  kill-switch-preflight:
    uses: ./.github/workflows/kill-switch-preflight.yml

  slack-notify-start:
    needs: kill-switch-preflight
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: start
      workflow_name: Manage Kill Switch
      job_name: apply
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}

  apply:
    needs:
      - kill-switch-preflight
      - slack-notify-start
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve kill-switch inputs
        id: config
        env:
          INPUT_ENABLED: ${{ github.event.inputs.enabled }}
          INPUT_MESSAGE: ${{ github.event.inputs.message }}
        run: |
          set -euo pipefail

          if [ "$INPUT_ENABLED" = "enable" ]; then
            enabled_value="true"
          else
            enabled_value="false"
          fi

          default_message="Unfortunately ItemTraxx is currently unavailable. We apologize for any inconvenience and are working to restore access as soon as possible. Please see the status page (https://status.itemtraxx.com/) for more information."
          normalized_message="$(printf '%s' "$INPUT_MESSAGE" | tr '\n' ' ' | sed -E 's/[[:space:]]+/ /g; s/^ //; s/ $//')"
          if [ -z "$normalized_message" ]; then
            normalized_message="$default_message"
          fi

          {
            echo "enabled=$enabled_value"
            echo "message<<EOF"
            echo "$normalized_message"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Sync Supabase kill-switch secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          KILL_SWITCH_ENABLED: ${{ steps.config.outputs.enabled }}
          KILL_SWITCH_MESSAGE: ${{ steps.config.outputs.message }}
        run: |
          set -euo pipefail
          npx supabase secrets set \
            "ITX_ITEMTRAXX_KILLSWITCH_ENABLED=$KILL_SWITCH_ENABLED" \
            "ITX_ITEMTRAXX_KILLSWITCH_MESSAGE=$KILL_SWITCH_MESSAGE" \
            --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy Cloudflare worker with kill-switch settings
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KILL_SWITCH_ENABLED: ${{ steps.config.outputs.enabled }}
          KILL_SWITCH_MESSAGE: ${{ steps.config.outputs.message }}
        run: |
          set -euo pipefail
          ./scripts/deploy-cloudflare-worker.sh \
            --var "ITX_ITEMTRAXX_KILLSWITCH_ENABLED:$KILL_SWITCH_ENABLED" \
            --var "ITX_ITEMTRAXX_KILLSWITCH_MESSAGE:$KILL_SWITCH_MESSAGE" \
            --message "Manage kill switch from GitHub Actions"

  slack-notify-finish:
    needs:
      - slack-notify-start
      - apply
    if: ${{ always() && needs.slack-notify-start.result == 'success' && needs.apply.result != 'skipped' }}
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: finish
      workflow_name: Manage Kill Switch
      job_name: apply
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      status: ${{ needs.apply.result }}
      slack_channel_id: ${{ needs.slack-notify-start.outputs.slack_channel_id }}
      slack_message_ts: ${{ needs.slack-notify-start.outputs.slack_message_ts }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}

  incidentio-notify-failure:
    needs:
      - kill-switch-preflight
      - apply
    if: ${{ always() && needs.kill-switch-preflight.outputs.active != 'true' && (needs.apply.result == 'failure' || needs.apply.result == 'cancelled') }}
    uses: ./.github/workflows/incidentio-workflow-alert.yml
    with:
      status: ${{ needs.apply.result }}
      severity: high
      workflow_name: Manage Kill Switch
      job_name: apply
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      repository: ${{ github.repository }}
      branch: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      environment: production
    secrets:
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}
