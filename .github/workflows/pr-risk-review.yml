name: PR Risk Review

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  risk-review:
    if: ${{ !github.event.pull_request.draft && github.actor != 'dependabot[bot]' }}
    uses: ItemTraxxCo/devops/.github/workflows/reusable-pr-risk-review.yml@2409b7dffc01e1bb24f5b3caee9669a93c37f1ca
    with:
      pr_number: ${{ format('{0}', github.event.pull_request.number) }}
      hub_ref: 2409b7dffc01e1bb24f5b3caee9669a93c37f1ca
    secrets:
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
