name: Deploy Supabase Functions

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - 'scripts/deploy-supabase-functions.py'
      - '.github/workflows/deploy-supabase-functions.yml'
  workflow_dispatch:
    inputs:
      functions:
        description: 'Optional space-separated function names to deploy. Leave blank to deploy all functions.'
        required: false
        default: ''

concurrency:
  group: deploy-supabase-functions-${{ github.ref }}
  cancel-in-progress: false

jobs:
  slack-notify-start:
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: start
      workflow_name: Deploy Supabase Functions
      job_name: deploy
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
    secrets: inherit

  deploy:
    needs: slack-notify-start
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          REQUESTED_FUNCTIONS: ${{ github.event.inputs.functions || '' }}
        run: |
          set -euo pipefail
          if [ -n "$REQUESTED_FUNCTIONS" ]; then
            python3 ./scripts/deploy-supabase-functions.py --project-ref "$SUPABASE_PROJECT_REF" $REQUESTED_FUNCTIONS
          else
            python3 ./scripts/deploy-supabase-functions.py --project-ref "$SUPABASE_PROJECT_REF"
          fi

  slack-notify-finish:
    needs:
      - slack-notify-start
      - deploy
    if: ${{ always() && needs.deploy.result != 'skipped' }}
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: finish
      workflow_name: Deploy Supabase Functions
      job_name: deploy
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      status: ${{ needs.deploy.result }}
      slack_channel_id: ${{ needs.slack-notify-start.outputs.slack_channel_id }}
      slack_message_ts: ${{ needs.slack-notify-start.outputs.slack_message_ts }}
    secrets: inherit
