name: Slack Notify Failure

# Thin shim: delegates to the ItemTraxxCo/devops automation hub.
# Interface is unchanged for all in-repo callers.

permissions: {}

on:
  workflow_call:
    inputs:
      workflow_name:
        required: true
        type: string
      job_name:
        required: true
        type: string
      run_url:
        required: true
        type: string
      ref_name:
        required: true
        type: string
      sha:
        required: true
        type: string
    secrets:
      SLACK_WEBHOOK_URL:
        required: true
      INCIDENT_IO_WEBHOOK_URL:
        required: false
      INCIDENT_IO_WEBHOOK_TOKEN:
        required: false

jobs:
  hub:
    uses: ItemTraxxCo/devops/.github/workflows/reusable-slack-notify-failure.yml@main
    with:
      workflow_name: ${{ inputs.workflow_name }}
      job_name: ${{ inputs.job_name }}
      run_url: ${{ inputs.run_url }}
      ref_name: ${{ inputs.ref_name }}
      sha: ${{ inputs.sha }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}
