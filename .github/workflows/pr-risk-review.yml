name: PR Risk Review

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  risk-review:
    if: ${{ !github.event.pull_request.draft && github.actor != 'dependabot[bot]' }}
    uses: ItemTraxxCo/devops/.github/workflows/reusable-pr-risk-review.yml@9fc8279c1de4a0a281cdbb800e58bafc12e46f88
    with:
      pr_number: ${{ format('{0}', github.event.pull_request.number) }}
      hub_ref: 9fc8279c1de4a0a281cdbb800e58bafc12e46f88
    secrets:
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
