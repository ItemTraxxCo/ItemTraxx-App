name: Schedule Watchdog

permissions:
  actions: read
  contents: read

on:
  schedule:
    - cron: "11,26,41,56 * * * *"
  workflow_dispatch:

jobs:
  check-stale-schedules:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Check scheduled workflow freshness
        id: watchdog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          API_BASE="https://api.github.com/repos/${REPOSITORY}"
          CURRENT_EPOCH="$(date -u +%s)"
          STALE_REPORT=""
          HEARTBEAT_REPORT=""

          check_workflow() {
            local workflow_file="$1"
            local workflow_name="$2"
            local heartbeat_max_age_seconds="$3"
            local success_max_age_seconds="$4"

            local response
            response="$(curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${API_BASE}/actions/workflows/${workflow_file}/runs?event=schedule&branch=main&status=completed&per_page=50")"

            local latest_completed
            latest_completed="$(printf '%s' "$response" | jq -r '
              .workflow_runs
              | sort_by(.created_at)
              | reverse
              | .[0].created_at // empty
            ')"

            local latest_success
            latest_success="$(printf '%s' "$response" | jq -r '
              .workflow_runs
              | map(select(.conclusion == "success"))
              | sort_by(.created_at)
              | reverse
              | .[0].created_at // empty
            ')"

            if [ -z "$latest_completed" ]; then
              STALE_REPORT="${STALE_REPORT}\n- ${workflow_name}: no completed scheduled runs found"
              return
            fi

            local latest_completed_epoch completed_age_minutes heartbeat_max_age_minutes
            latest_completed_epoch="$(python3 -c 'from datetime import datetime; import sys; print(int(datetime.fromisoformat(sys.argv[1].replace("Z", "+00:00")).timestamp()))' "$latest_completed")"
            completed_age_minutes="$(( (CURRENT_EPOCH - latest_completed_epoch) / 60 ))"
            heartbeat_max_age_minutes="$(( heartbeat_max_age_seconds / 60 ))"

            if [ $(( CURRENT_EPOCH - latest_completed_epoch )) -gt "$heartbeat_max_age_seconds" ]; then
              HEARTBEAT_REPORT="${HEARTBEAT_REPORT}\n- ${workflow_name}: last completed scheduled run was ${completed_age_minutes} minutes ago (heartbeat threshold ${heartbeat_max_age_minutes} minutes)"
              return
            fi

            if [ -z "$latest_success" ]; then
              STALE_REPORT="${STALE_REPORT}\n- ${workflow_name}: no successful scheduled runs in recent history"
              return
            fi

            local latest_success_epoch success_age_minutes success_max_age_minutes
            latest_success_epoch="$(python3 -c 'from datetime import datetime; import sys; print(int(datetime.fromisoformat(sys.argv[1].replace("Z", "+00:00")).timestamp()))' "$latest_success")"
            success_age_minutes="$(( (CURRENT_EPOCH - latest_success_epoch) / 60 ))"
            success_max_age_minutes="$(( success_max_age_seconds / 60 ))"

            if [ $(( CURRENT_EPOCH - latest_success_epoch )) -gt "$success_max_age_seconds" ]; then
              STALE_REPORT="${STALE_REPORT}\n- ${workflow_name}: last successful scheduled run was ${success_age_minutes} minutes ago (success threshold ${success_max_age_minutes} minutes)"
            fi
          }

          # heartbeat threshold is warning-only (non-fatal) to reduce alert noise
          # success threshold is the fatal watchdog gate
          check_workflow "async-job-worker.yml" "Async Job Worker" 1800 7200
          check_workflow "synthetic-journeys.yml" "Synthetic Journeys" 5400 10800
          check_workflow "deployment-health.yml" "Deployment Health" 10800 14400
          if [ -n "$HEARTBEAT_REPORT" ]; then
            {
              echo "heartbeat_stale=true"
              echo "heartbeat_report<<EOF"
              printf '%b\n' "$HEARTBEAT_REPORT"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "Heartbeat threshold warnings (non-fatal):"
            printf '%b\n' "$HEARTBEAT_REPORT"
          else
            echo "heartbeat_stale=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$STALE_REPORT" ]; then
            {
              echo "stale=true"
              echo "report<<EOF"
              printf '%b\n' "$STALE_REPORT"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "Detected stale scheduled workflows:"
            printf '%b\n' "$STALE_REPORT"
            exit 1
          fi

          echo "stale=false" >> "$GITHUB_OUTPUT"
          echo "All scheduled workflows are within freshness thresholds."

      - name: Send Slack watchdog alert
        if: ${{ failure() && steps.watchdog.outputs.stale == 'true' && env.SLACK_WEBHOOK_URL != '' }}
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPORT: ${{ steps.watchdog.outputs.report }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          PAYLOAD="$(jq -n \
            --arg run_url "$RUN_URL" \
            --arg repo "$REPOSITORY" \
            --arg report "$REPORT" \
            '{
              text: "Scheduled workflow watchdog alert",
              attachments: [
                {
                  color: "#e01e5a",
                  fields: [
                    { title: "Status", value: "Stale scheduled workflows detected", short: false },
                    { title: "Repository", value: $repo, short: false },
                    { title: "Run", value: ("<" + $run_url + "|Open watchdog run>"), short: false },
                    { title: "Details", value: $report, short: false }
                  ],
                  footer: "GitHub Actions"
                }
              ]
            }')"
          curl -fsSL -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD"

      - name: Send Slack heartbeat warning
        if: ${{ steps.watchdog.outputs.heartbeat_stale == 'true' && env.SLACK_WEBHOOK_URL != '' }}
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPORT: ${{ steps.watchdog.outputs.heartbeat_report }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          PAYLOAD="$(jq -n \
            --arg run_url "$RUN_URL" \
            --arg repo "$REPOSITORY" \
            --arg report "$REPORT" \
            '{
              text: "Scheduled workflow heartbeat warning",
              attachments: [
                {
                  color: "#f2c744",
                  fields: [
                    { title: "Status", value: "Heartbeat threshold exceeded (warning only)", short: false },
                    { title: "Repository", value: $repo, short: false },
                    { title: "Run", value: ("<" + $run_url + "|Open watchdog run>"), short: false },
                    { title: "Details", value: $report, short: false }
                  ],
                  footer: "GitHub Actions"
                }
              ]
            }')"
          curl -fsSL -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD"
