name: Async Job Worker

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  process-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Process async jobs
        env:
          ITX_JOB_WORKER_SECRET: ${{ secrets.ITX_JOB_WORKER_SECRET }}
        run: |
          set -euo pipefail
          curl -fsS \
            -X POST "https://itemtraxx-edge-proxy.itemtraxx-co.workers.dev/functions/job-worker" \
            -H "Origin: https://itemtraxx.com" \
            -H "Authorization: Bearer ${ITX_JOB_WORKER_SECRET}" \
            -H "Content-Type: application/json" \
            --data '{"limit": 30, "run_reporting_refresh": true}' \
            | head -c 500

  notify-slack-on-failure:
    needs: process-jobs
    if: ${{ always() && needs.process-jobs.result == 'failure' }}
    uses: ./.github/workflows/slack-notify-failure.yml
    with:
      workflow_name: Async Job Worker
      job_name: process-jobs
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
    secrets: inherit
