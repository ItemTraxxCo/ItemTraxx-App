name: Synthetic Journeys

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: "0,30 * * * *"

jobs:
  slack-notify-start:
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: start
      workflow_name: Synthetic Journeys
      job_name: synthetic-smoke
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
    secrets: inherit

  synthetic-smoke:
    needs: slack-notify-start
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run production synthetic smoke checks
        run: bash ./scripts/synthetic-smoke.sh

  slack-notify-finish:
    needs:
      - slack-notify-start
      - synthetic-smoke
    if: ${{ always() && needs.synthetic-smoke.result != 'skipped' }}
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: finish
      workflow_name: Synthetic Journeys
      job_name: synthetic-smoke
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      status: ${{ needs.synthetic-smoke.result }}
      slack_channel_id: ${{ needs.slack-notify-start.outputs.slack_channel_id }}
      slack_message_ts: ${{ needs.slack-notify-start.outputs.slack_message_ts }}
    secrets: inherit
