name: Security Audit

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
      - preview

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  slack-notify-start:
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: start
      workflow_name: Security Audit
      job_name: security-audit
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
    secrets: inherit

  security-audit:
    needs: slack-notify-start
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run security gate
        run: npm run security:gate

      - name: Generate SBOM
        run: npm run security:sbom

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sbom
          path: artifacts/sbom.cdx.json
          if-no-files-found: error

  slack-notify-finish:
    needs:
      - slack-notify-start
      - security-audit
    if: ${{ always() && needs.security-audit.result != 'skipped' }}
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: finish
      workflow_name: Security Audit
      job_name: security-audit
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      status: ${{ needs.security-audit.result }}
      slack_channel_id: ${{ needs.slack-notify-start.outputs.slack_channel_id }}
      slack_message_ts: ${{ needs.slack-notify-start.outputs.slack_message_ts }}
    secrets: inherit
