name: Deploy Supabase Functions

permissions:
  actions: read
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - 'scripts/deploy-supabase-functions.py'
      - '.github/workflows/deploy-supabase-functions.yml'
  workflow_dispatch:
    inputs:
      functions:
        description: 'Optional space-separated function names to deploy. Leave blank to deploy all functions.'
        required: false
        default: ''

concurrency:
  group: deploy-supabase-functions-${{ github.ref }}
  cancel-in-progress: false

jobs:
  kill-switch-preflight:
    uses: ./.github/workflows/kill-switch-preflight.yml

  slack-notify-start:
    needs: kill-switch-preflight
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: start
      workflow_name: Deploy Supabase Functions
      job_name: deploy
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}

  deploy:
    needs:
      - kill-switch-preflight
      - slack-notify-start
    if: ${{ needs.kill-switch-preflight.outputs.active != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.15.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          REQUESTED_FUNCTIONS: ${{ github.event.inputs.functions || '' }}
        run: |
          set -euo pipefail
          if [ -n "$REQUESTED_FUNCTIONS" ]; then
            python3 ./scripts/deploy-supabase-functions.py --project-ref "$SUPABASE_PROJECT_REF" $REQUESTED_FUNCTIONS
          else
            python3 ./scripts/deploy-supabase-functions.py --project-ref "$SUPABASE_PROJECT_REF"
          fi

  slack-notify-finish:
    needs:
      - slack-notify-start
      - deploy
    if: ${{ always() && needs.slack-notify-start.result == 'success' && needs.deploy.result != 'skipped' }}
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: finish
      workflow_name: Deploy Supabase Functions
      job_name: deploy
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      status: ${{ needs.deploy.result }}
      slack_channel_id: ${{ needs.slack-notify-start.outputs.slack_channel_id }}
      slack_message_ts: ${{ needs.slack-notify-start.outputs.slack_message_ts }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}

  slack-notify-kill-switch-skip:
    needs:
      - kill-switch-preflight
      - slack-notify-start
      - deploy
    if: ${{ always() && needs.slack-notify-start.result == 'success' && needs.kill-switch-preflight.outputs.active == 'true' && needs.deploy.result == 'skipped' }}
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: finish
      workflow_name: Deploy Supabase Functions
      job_name: deploy
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      status: success
      status_message: ${{ format('Intentionally skipped because the ItemTraxx kill switch is active. {0}', needs.kill-switch-preflight.outputs.message) }}
      slack_channel_id: ${{ needs.slack-notify-start.outputs.slack_channel_id }}
      slack_message_ts: ${{ needs.slack-notify-start.outputs.slack_message_ts }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}

  incidentio-notify-failure:
    needs:
      - kill-switch-preflight
      - deploy
    if: ${{ always() && needs.kill-switch-preflight.outputs.active != 'true' && (needs.deploy.result == 'failure' || needs.deploy.result == 'cancelled') }}
    uses: ./.github/workflows/incidentio-workflow-alert.yml
    with:
      status: ${{ needs.deploy.result }}
      severity: high
      workflow_name: Deploy Supabase Functions
      job_name: deploy
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      repository: ${{ github.repository }}
      branch: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      environment: production
    secrets:
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}
