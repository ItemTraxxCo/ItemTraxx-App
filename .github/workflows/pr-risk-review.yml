name: PR Risk Review

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  risk-review:
    if: ${{ !github.event.pull_request.draft && github.actor != 'dependabot[bot]' }}
    uses: ItemTraxxCo/devops/.github/workflows/reusable-pr-risk-review.yml@6bcf366a32a1c5a5198b014648fe8e4133828e30
    with:
      pr_number: ${{ format('{0}', github.event.pull_request.number) }}
    secrets:
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
