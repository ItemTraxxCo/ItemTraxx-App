name: E2E Tests

permissions:
  actions: read
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
      - preview

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  slack-notify-start:
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: start
      workflow_name: E2E Tests
      job_name: e2e
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
    secrets: inherit

  e2e:
    needs: slack-notify-start
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        # Avoid flaky native/CLI postinstall downloads during E2E runs (for example `supabase` CLI).
        # Playwright browsers are installed explicitly in the next step.
        run: npm ci --ignore-scripts

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  slack-notify-finish:
    needs:
      - slack-notify-start
      - e2e
    if: ${{ always() && needs.e2e.result != 'skipped' }}
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: finish
      workflow_name: E2E Tests
      job_name: e2e
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      status: ${{ needs.e2e.result }}
      slack_channel_id: ${{ needs.slack-notify-start.outputs.slack_channel_id }}
      slack_message_ts: ${{ needs.slack-notify-start.outputs.slack_message_ts }}
    secrets: inherit
