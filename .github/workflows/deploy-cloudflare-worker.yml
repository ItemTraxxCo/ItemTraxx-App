name: Deploy Cloudflare Worker

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'cloudflare/edge-proxy/**'
      - 'scripts/deploy-cloudflare-worker.sh'
      - '.github/workflows/deploy-cloudflare-worker.yml'
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-worker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm install --global wrangler@4

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ./scripts/deploy-cloudflare-worker.sh

  notify-slack-on-failure:
    needs: deploy
    if: ${{ always() && needs.deploy.result == 'failure' }}
    uses: ./.github/workflows/slack-notify-failure.yml
    with:
      workflow_name: Deploy Cloudflare Worker
      job_name: deploy
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
    secrets: inherit
