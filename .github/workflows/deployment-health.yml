name: Deployment Health

permissions:
  actions: read
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: "29 * * * *"

jobs:
  kill-switch-preflight:
    uses: ./.github/workflows/kill-switch-preflight.yml

  slack-notify-start:
    needs: kill-switch-preflight
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: start
      workflow_name: Deployment Health
      job_name: health-check
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}

  health-check:
    needs:
      - kill-switch-preflight
      - slack-notify-start
    if: ${{ needs.kill-switch-preflight.outputs.active != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check site and security headers
        run: |
          set -euo pipefail
          BROWSER_UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"
          CHALLENGE_SKIPS=0
          PASS_COUNT=0

          kill_switch_active() {
            local body
            body="$(mktemp)"
            local status
            status="$(curl -sS -o "$body" -w '%{http_code}' \
              --connect-timeout 5 \
              --max-time 15 \
              -H "Accept: application/json" \
              -H "Origin: https://itemtraxx.com" \
              "https://edge.itemtraxx.com/functions/system-status" || true)"
            if [ "$status" -ge 200 ] && [ "$status" -lt 300 ] && jq -e '.kill_switch.enabled == true' "$body" >/dev/null 2>&1; then
              rm -f "$body"
              return 0
            fi
            rm -f "$body"
            return 1
          }

          check_headers() {
            local url="$1"
            echo "== $url"
            local headers
            headers="$(curl -sSI --http1.1 \
              --retry 3 \
              --retry-delay 2 \
              --retry-all-errors \
              -A "$BROWSER_UA" \
              -H "Accept: text/html,application/xhtml+xml" \
              -H "Accept-Language: en-US,en;q=0.9" \
              "$url")"

            local status
            status="$(printf "%s\n" "$headers" | awk 'NR==1 {print $2}')"
            if [ -z "$status" ]; then
              echo "Missing HTTP status for $url"
              exit 1
            fi
            if [ "$status" -ge 400 ]; then
              if [ "$status" -eq 403 ] && printf "%s\n" "$headers" | grep -qi "cf-mitigated: challenge"; then
                echo "Cloudflare challenge for $url (non-browser CI request). Skipping this URL."
                CHALLENGE_SKIPS=$((CHALLENGE_SKIPS + 1))
                return 0
              fi
              if [ "$status" -eq 503 ] && kill_switch_active; then
                echo "Kill switch active; treating $url as intentional maintenance skip."
                return 0
              fi
              echo "HTTP $status for $url"
              printf "%s\n" "$headers"
              return 1
            fi

            printf "%s\n" "$headers" | grep -i "content-security-policy" >/dev/null
            printf "%s\n" "$headers" | grep -i "strict-transport-security" >/dev/null
            PASS_COUNT=$((PASS_COUNT + 1))
          }

          FAILED=0
          for u in \
            "https://itemtraxx.com" \
            "https://www.itemtraxx.com" \
            "https://itemtraxx.com/login" \
            "https://itemtraxx.com/tenant/checkout"; do
            if ! check_headers "$u"; then
              FAILED=1
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            echo "One or more header checks failed."
            exit 1
          fi

          if [ "$PASS_COUNT" -eq 0 ] && [ "$CHALLENGE_SKIPS" -gt 0 ]; then
            echo "All URL checks were Cloudflare-challenged; skipping header assertions in CI."
          elif [ "$PASS_COUNT" -eq 0 ]; then
            echo "No successful header checks completed."
            exit 1
          fi

          echo "Header checks passed: $PASS_COUNT, challenge skips: $CHALLENGE_SKIPS"

      - name: Check status endpoint
        run: |
          set -euo pipefail
          BODY="$(mktemp)"
          STATUS="$(curl -sS -o "$BODY" -w '%{http_code}' "https://mlaspkufocikfcbjgpof.supabase.co/functions/v1/system-status" \
            -H "Origin: https://itemtraxx.com" \
            || true)"
          if [ "$STATUS" -eq 503 ] && jq -e '.kill_switch.enabled == true' "$BODY" >/dev/null 2>&1; then
            echo "Kill switch active; treating system-status 503 as intentional maintenance skip."
            head -c 300 "$BODY"
            exit 0
          fi
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "system-status returned HTTP $STATUS"
            cat "$BODY" || true
            exit 1
          fi
          head -c 300 "$BODY"

  slack-notify-finish:
    needs:
      - slack-notify-start
      - health-check
    if: ${{ always() && needs.slack-notify-start.result == 'success' && needs.health-check.result != 'skipped' }}
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: finish
      workflow_name: Deployment Health
      job_name: health-check
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      status: ${{ needs.health-check.result }}
      slack_channel_id: ${{ needs.slack-notify-start.outputs.slack_channel_id }}
      slack_message_ts: ${{ needs.slack-notify-start.outputs.slack_message_ts }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}

  slack-notify-kill-switch-skip:
    needs:
      - kill-switch-preflight
      - slack-notify-start
      - health-check
    if: ${{ always() && needs.slack-notify-start.result == 'success' && needs.kill-switch-preflight.outputs.active == 'true' && needs.health-check.result == 'skipped' }}
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: finish
      workflow_name: Deployment Health
      job_name: health-check
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      status: skipped
      status_message: ${{ format('Intentionally skipped because the ItemTraxx kill switch is active. {0}', needs.kill-switch-preflight.outputs.message) }}
      slack_channel_id: ${{ needs.slack-notify-start.outputs.slack_channel_id }}
      slack_message_ts: ${{ needs.slack-notify-start.outputs.slack_message_ts }}
      incident_alerts_enabled: false
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}

  incidentio-notify-failure:
    needs:
      - kill-switch-preflight
      - health-check
    if: ${{ always() && needs.kill-switch-preflight.outputs.active != 'true' && (needs.health-check.result == 'failure' || needs.health-check.result == 'cancelled') }}
    uses: ./.github/workflows/incidentio-workflow-alert.yml
    with:
      status: ${{ needs.health-check.result }}
      severity: high
      workflow_name: Deployment Health
      job_name: health-check
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      repository: ${{ github.repository }}
      branch: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      environment: production
    secrets:
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}
