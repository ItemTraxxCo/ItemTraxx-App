name: CodeQL

permissions:
  actions: read
  contents: read
  security-events: write

on:
  push:
    branches:
      - main
      - preview
  pull_request:
  schedule:
    - cron: '21 9 * * 1'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kill-switch-preflight:
    uses: ./.github/workflows/kill-switch-preflight.yml

  slack-notify-start:
    needs: kill-switch-preflight
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: start
      workflow_name: CodeQL
      job_name: analyze
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
    secrets: inherit

  analyze:
    name: Analyze (${{ matrix.language }})
    needs:
      - kill-switch-preflight
      - slack-notify-start
    if: ${{ needs.kill-switch-preflight.outputs.active != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Setup Node
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        if: matrix.language == 'javascript-typescript'
        run: npm ci

      - name: Build app
        if: matrix.language == 'javascript-typescript'
        run: npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: '/language:${{ matrix.language }}'

  slack-notify-finish:
    needs:
      - slack-notify-start
      - analyze
    if: ${{ always() && needs.analyze.result != 'skipped' }}
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: finish
      workflow_name: CodeQL
      job_name: analyze
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      status: ${{ needs.analyze.result }}
      slack_channel_id: ${{ needs.slack-notify-start.outputs.slack_channel_id }}
      slack_message_ts: ${{ needs.slack-notify-start.outputs.slack_message_ts }}
    secrets: inherit

  slack-notify-kill-switch-skip:
    needs:
      - kill-switch-preflight
      - slack-notify-start
      - analyze
    if: ${{ always() && needs.kill-switch-preflight.outputs.active == 'true' && needs.analyze.result == 'skipped' }}
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: finish
      workflow_name: CodeQL
      job_name: analyze
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      status: success
      status_message: ${{ format('Intentionally skipped because the ItemTraxx kill switch is active. {0}', needs.kill-switch-preflight.outputs.message) }}
      slack_channel_id: ${{ needs.slack-notify-start.outputs.slack_channel_id }}
      slack_message_ts: ${{ needs.slack-notify-start.outputs.slack_message_ts }}
    secrets: inherit

  incidentio-notify-failure:
    needs:
      - kill-switch-preflight
      - analyze
    if: ${{ always() && needs.kill-switch-preflight.outputs.active != 'true' && github.event_name != 'pull_request' && (needs.analyze.result == 'failure' || needs.analyze.result == 'cancelled') }}
    uses: ./.github/workflows/incidentio-workflow-alert.yml
    with:
      status: ${{ needs.analyze.result }}
      severity: high
      workflow_name: CodeQL
      job_name: analyze
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      repository: ${{ github.repository }}
      branch: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      environment: production
    secrets: inherit
