name: Async Job Worker

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  slack-notify-start:
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: start
      workflow_name: Async Job Worker
      job_name: process-jobs
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
    secrets: inherit

  process-jobs:
    needs: slack-notify-start
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Process async jobs
        env:
          ITX_JOB_WORKER_SECRET: ${{ secrets.ITX_JOB_WORKER_SECRET }}
        run: |
          set -euo pipefail
          curl -fsS \
            -X POST "https://itemtraxx-edge-proxy.itemtraxx-co.workers.dev/functions/job-worker" \
            -H "Origin: https://itemtraxx.com" \
            -H "Authorization: Bearer ${ITX_JOB_WORKER_SECRET}" \
            -H "Content-Type: application/json" \
            --data '{"limit": 30, "run_reporting_refresh": true}' \
            | head -c 500

  slack-notify-finish:
    needs:
      - slack-notify-start
      - process-jobs
    if: ${{ always() && needs.process-jobs.result != 'skipped' }}
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: finish
      workflow_name: Async Job Worker
      job_name: process-jobs
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      status: ${{ needs.process-jobs.result }}
      slack_channel_id: ${{ needs.slack-notify-start.outputs.slack_channel_id }}
      slack_message_ts: ${{ needs.slack-notify-start.outputs.slack_message_ts }}
    secrets: inherit
