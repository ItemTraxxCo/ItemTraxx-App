name: CI Triage

permissions:
  actions: read
  contents: read

on:
  workflow_run:
    workflows:
      - CI Core
      - E2E Tests
      - Security Audit
      - CodeQL
      - Deploy Supabase Functions
      - Deploy Cloudflare Worker
      - Deployment Health
      - Synthetic Journeys
      - Synthetic Probes (Hub)
    types:
      - completed

jobs:
  triage:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    uses: ItemTraxxCo/devops/.github/workflows/reusable-ci-triage.yml@4fd58daee1a0fccde29ffc9c896d07ea21e731ab
    with:
      run_id: ${{ format('{0}', github.event.workflow_run.id) }}
      workflow_name: ${{ github.event.workflow_run.name }}
      hub_ref: 4fd58daee1a0fccde29ffc9c896d07ea21e731ab
    secrets:
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
