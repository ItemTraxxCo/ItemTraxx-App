name: Deploy Cloudflare Worker

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'cloudflare/edge-proxy/**'
      - 'scripts/deploy-cloudflare-worker.sh'
      - '.github/workflows/deploy-cloudflare-worker.yml'
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-worker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  slack-notify-start:
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: start
      workflow_name: Deploy Cloudflare Worker
      job_name: deploy
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
    secrets: inherit

  deploy:
    needs: slack-notify-start
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ./scripts/deploy-cloudflare-worker.sh

  slack-notify-finish:
    needs:
      - slack-notify-start
      - deploy
    if: ${{ always() && needs.deploy.result != 'skipped' }}
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: finish
      workflow_name: Deploy Cloudflare Worker
      job_name: deploy
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      status: ${{ needs.deploy.result }}
      slack_channel_id: ${{ needs.slack-notify-start.outputs.slack_channel_id }}
      slack_message_ts: ${{ needs.slack-notify-start.outputs.slack_message_ts }}
    secrets: inherit
