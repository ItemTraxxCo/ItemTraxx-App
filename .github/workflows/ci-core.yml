name: CI Core

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
      - preview

concurrency:
  group: ci-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  slack-notify-start:
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: start
      workflow_name: CI Core
      job_name: build-and-verify
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
    secrets: inherit

  build-and-verify:
    needs: slack-notify-start
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify env parity
        run: bash ./scripts/check-env-parity.sh

      - name: Clean dist
        run: rm -rf dist artifacts

      - name: Build
        run: npm run build

      - name: Check bundle budget
        run: npm run perf:budget

      - name: Check image budget
        run: npm run perf:images

      - name: Generate perf report
        run: npm run perf:report

      - name: Upload perf report artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: perf-report
          path: artifacts/perf-report.json
          if-no-files-found: ignore

  slack-notify-finish:
    needs:
      - slack-notify-start
      - build-and-verify
    if: ${{ always() && needs.build-and-verify.result != 'skipped' }}
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: finish
      workflow_name: CI Core
      job_name: build-and-verify
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      status: ${{ needs.build-and-verify.result }}
      slack_channel_id: ${{ needs.slack-notify-start.outputs.slack_channel_id }}
      slack_message_ts: ${{ needs.slack-notify-start.outputs.slack_message_ts }}
    secrets: inherit
