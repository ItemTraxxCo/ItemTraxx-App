name: CI Core

permissions:
  actions: read
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
      - preview
      - staging

concurrency:
  group: ci-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kill-switch-preflight:
    uses: ./.github/workflows/kill-switch-preflight.yml

  slack-notify-start:
    needs: kill-switch-preflight
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: start
      workflow_name: CI Core
      job_name: build-and-verify
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}

  build-and-verify:
    needs:
      - kill-switch-preflight
      - slack-notify-start
    if: ${{ needs.kill-switch-preflight.outputs.active != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22.15.0
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: 2.x
          cache: true

      - name: Install dependencies
        # Avoid flaky native/CLI postinstall downloads during CI (for example `supabase` CLI).
        run: npm ci --ignore-scripts

      - name: Verify env parity
        run: bash ./scripts/check-env-parity.sh

      - name: Check edge-function coverage
        run: npm run devops:check:edge-coverage

      - name: Check edge contract drift
        run: npm run devops:check:edge-contract-drift

      - name: Check edge action contract parity
        run: npm run devops:check:edge-action-parity

      - name: Check Supabase function graph with frozen Deno lock
        run: deno check --frozen supabase/functions/super-ops/index.ts supabase/functions/super-tenant-mutate/index.ts supabase/functions/admin-ops/index.ts

      - name: Test shared Supabase helpers with frozen Deno lock
        run: deno test --allow-env --frozen supabase/functions/_shared/*_test.ts

      - name: Check SQL and function coupling
        env:
          ITX_DIFF_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          ITX_DIFF_HEAD: ${{ github.sha }}
        run: npm run devops:check:sql-coupling

      - name: Clean dist
        run: rm -rf dist artifacts

      - name: Build
        run: npm run build

      - name: Check public CSS boundary
        run: npm run perf:css-boundary

      - name: Typecheck Cloudflare Worker
        run: npm run worker:typecheck

      - name: Test Cloudflare Worker
        run: npm run worker:test

      - name: Check initial JavaScript budget
        run: npm run perf:initial

      - name: Check bundle budget
        run: npm run perf:budget

      - name: Check image budget
        run: npm run perf:images

      - name: Generate perf report
        run: npm run perf:report

      - name: Upload perf report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: perf-report
          path: artifacts/perf-report.json
          if-no-files-found: ignore
          retention-days: 14

  slack-notify-finish:
    needs:
      - slack-notify-start
      - build-and-verify
    if: ${{ always() && needs.slack-notify-start.result == 'success' && needs.build-and-verify.result != 'skipped' }}
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: finish
      workflow_name: CI Core
      job_name: build-and-verify
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      status: ${{ needs.build-and-verify.result }}
      slack_channel_id: ${{ needs.slack-notify-start.outputs.slack_channel_id }}
      slack_message_ts: ${{ needs.slack-notify-start.outputs.slack_message_ts }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}

  slack-notify-kill-switch-skip:
    needs:
      - kill-switch-preflight
      - slack-notify-start
      - build-and-verify
    if: ${{ always() && needs.slack-notify-start.result == 'success' && needs.kill-switch-preflight.outputs.active == 'true' && needs.build-and-verify.result == 'skipped' }}
    uses: ./.github/workflows/slack-notify-status.yml
    with:
      mode: finish
      workflow_name: CI Core
      job_name: build-and-verify
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      ref_name: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      status: success
      status_message: ${{ format('Intentionally skipped because the ItemTraxx kill switch is active. {0}', needs.kill-switch-preflight.outputs.message) }}
      slack_channel_id: ${{ needs.slack-notify-start.outputs.slack_channel_id }}
      slack_message_ts: ${{ needs.slack-notify-start.outputs.slack_message_ts }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}

  incidentio-notify-failure:
    needs:
      - kill-switch-preflight
      - slack-notify-start
      - build-and-verify
    if: ${{ always() && needs.kill-switch-preflight.outputs.active != 'true' && needs.slack-notify-start.result == 'success' && (needs.build-and-verify.result == 'failure' || (github.event_name != 'pull_request' && needs.build-and-verify.result == 'cancelled')) }}
    uses: ./.github/workflows/incidentio-workflow-alert.yml
    with:
      status: ${{ needs.build-and-verify.result }}
      severity: high
      workflow_name: CI Core
      job_name: build-and-verify
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      repository: ${{ github.repository }}
      branch: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      environment: production
    secrets:
      INCIDENT_IO_WEBHOOK_URL: ${{ secrets.INCIDENT_IO_WEBHOOK_URL }}
      INCIDENT_IO_WEBHOOK_TOKEN: ${{ secrets.INCIDENT_IO_WEBHOOK_TOKEN }}
